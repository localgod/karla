name: Setup PHP Environment for Copilot Agent

# This configuration runs before the firewall is enabled,
# allowing Composer to download dependencies from GitHub

on:
  setup:
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Cache vendor directory
        run: echo "Composer dependencies installed successfully"
